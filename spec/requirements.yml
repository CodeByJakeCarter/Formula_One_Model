- id: REQ-001
  title: Historical Data Ingestion
  rigidity: HARD
  depends_on:
  - Q-001
  status: todo
  statement: System ingests structured historical F1 race data.
  acceptance:
  - At least one full season can be loaded and queried.
  - Core entities (Driver, Constructor, Race, Season, Result) are persisted.
  - Deterministic reload produces identical dataset state (given the same source data + ingestion config).
  verification:
  - type: command
    run: ./.venv/bin/python -m pytest -q
    description: Run canonical verification test suite.
  tests: []
  artifacts:
    db_migrations: true
    api_surface: false
    docs_update: true
    adr_required: true
  notes: 'Unblocked after Q-001 resolution; canonical source is Jolpica API (DEC-2026-03-03-001, ADR 0002). Milestone scope is full 2025 season coverage. Ingestion must be idempotent on rerun (no duplicates). Deterministic reload is defined as identical post-run dataset state from fixed source data + fixed ingestion config; ingestion is non-random (no seed required). URL pinning deferred.'
- id: REQ-002
  title: Race-Level Probabilistic Prediction
  rigidity:
    schema: HARD
    methodology: SOFT
  depends_on: []
  status: todo
  statement: System generates probabilistic race outcome predictions.
  api_contract:
    endpoint_hint: /api/v1/ (see REQ-005)
    response_shape:
      race_id: int
      driver_predictions:
      - driver_id: int
        win_probability: float
        podium_probability: float
        expected_points: float
  acceptance:
  - API returns probability distributions for a given race.
  - Sum of win_probability across drivers equals 1 ± tolerance.
  - All probability values are within [0,1].
  - Deterministic results given fixed seed/config.
  verification:
  - type: command
    run: ./.venv/bin/python -m pytest -q
    description: Run canonical verification test suite.
  tests: []
  artifacts:
    db_migrations: false
    api_surface: true
    docs_update: true
    adr_required: true
  notes: Probability semantics beyond schema (e.g., calibration) remain SOFT unless promoted to HARD via an ADR.
